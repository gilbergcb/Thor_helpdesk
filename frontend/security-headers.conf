# F-16 Phase 4.4 — Security headers (incluido em cada location).
# Necessario duplicar entre locations porque `add_header` em location
# block apaga as herdadas do server block.

# HTTPS forcado (assume TLS termination no proxy reverso a frente).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Anti-MIME sniffing.
add_header X-Content-Type-Options "nosniff" always;

# Bloqueia framing (clickjacking). Sem iframes no app.
add_header X-Frame-Options "DENY" always;

# Limita info enviada em Referer cross-origin.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Desliga APIs que o app nao usa.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# CSP em modo Report-Only por 7 dias antes do enforce.
# Vite emite scripts/styles hashados em /assets — 'self' cobre.
# 'unsafe-inline' em style por causa de styled-components/critical CSS
# inline. img-src + media-src incluem data: e blob: para previews e
# /api/v1/media/*. connect-src 'self' cobre o backend via proxy_pass.
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
