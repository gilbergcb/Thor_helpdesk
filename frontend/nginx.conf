server {
  # F-14 Phase 4.2: nginx-unprivileged escuta em 8080 (sem precisar de
  # CAP_NET_BIND_SERVICE para porta < 1024).
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # F-16: oculta versao do nginx no header Server.
  server_tokens off;

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    include /etc/nginx/snippets/security-headers.conf;
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/snippets/security-headers.conf;
    try_files $uri =404;
  }

  location /api/ {
    # F-17 Phase 4.6: limita corpo do webhook a 100k (Z-API media base64 fica fora).
    client_max_body_size 1m;
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/security-headers.conf;
  }

  location /api/v1/webhooks/ {
    client_max_body_size 100k;
    proxy_pass http://backend:8000/api/v1/webhooks/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    include /etc/nginx/snippets/security-headers.conf;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    include /etc/nginx/snippets/security-headers.conf;
    try_files $uri /index.html;
  }
}
